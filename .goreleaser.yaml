version: 2
project_name: uspto-patents-pp-cli
changelog:
  disable: true
builds:
  - id: uspto-patents-pp-cli
    main: ./cmd/uspto-patents-pp-cli
    binary: uspto-patents-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X uspto-patents-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: uspto-patents-pp-mcp
    main: ./cmd/uspto-patents-pp-mcp
    binary: uspto-patents-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: uspto-patents-pp-cli
    repository:
      owner: h179922
      name: homebrew-tap
    homepage: "https://github.com/h179922/uspto-patents-pp-cli"
    description: "Every patent prosecution feature from every existing tool, plus offline search, family trees, and portfolio..."
    install: |
      bin.install "uspto-patents-pp-cli"
      bin.install "uspto-patents-pp-mcp"
